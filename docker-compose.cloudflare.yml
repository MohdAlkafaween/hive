# HIVE — Cloudflare Tunnel deployment override (locally-managed mode)
#
# Use this when fronting HIVE with a Cloudflare Tunnel (e.g. a local VM that
# has no public IP). Cloudflare's edge terminates HTTPS; cloudflared makes an
# outbound tunnel to Cloudflare and forwards traffic to the hive container
# over the internal Docker network — no inbound ports needed on the VM.
#
# Setup is fully CLI-driven (no dashboard clicks):
#   1. Install cloudflared on the VM and authenticate (one browser visit, like
#      Tailscale).
#   2. Create the tunnel:                   cloudflared tunnel create hive-prod
#   3. Add the DNS record:                  cloudflared tunnel route dns hive-prod <domain>
#   4. Place the credentials and config in ./cloudflared/ (mounted into the
#      container at /etc/cloudflared/).
#
# Full step-by-step in deploy/CLOUDFLARE_TUNNEL_SETUP.md
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d

services:
  # Cloudflare handles SSL at the edge — local nginx is unnecessary
  nginx:
    profiles: ["disabled"]
  certbot:
    profiles: ["disabled"]

  # No host ports — the only way in is via the tunnel
  hive:
    ports: !reset []

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hive-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      hive:
        condition: service_healthy
