# BOOTSTRAP CONFIG — used ONLY for the first certificate issuance.
# Nginx can't start with the SSL config until certificates exist, and Certbot
# needs Nginx running to answer the ACME challenge. Chicken-and-egg solved by:
#
#   1. cp nginx/nginx-http-only.conf  → mount as default.conf (setup.sh does this)
#   2. docker compose up -d hive nginx
#   3. run the certbot certonly command (see deploy/setup.sh output)
#   4. swap back to nginx/nginx.conf and: docker compose restart nginx

upstream hive_app {
    server hive:3000;
}

server {
    listen 80;
    server_name hivestation.space www.hivestation.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve the app over plain HTTP during bootstrap so you can verify it's up.
    # NOTE: logins won't work over HTTP (secure cookies) — that's expected here.
    location / {
        proxy_pass http://hive_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
