services:
  hive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hive-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # localhost only — Nginx proxies public traffic
    volumes:
      - hive-data:/app/data # SQLite DB (hive.db) + backups + receipt JSONs
      - hive-uploads:/app/public/uploads # menu images + student photos
    environment:
      - NODE_ENV=production
      - TZ=Asia/Amman
      # Used by the Prisma CLI (db push) in the entrypoint; the runtime client
      # opens /app/dev.db which the entrypoint symlinks to this same file.
      - DATABASE_URL=file:/app/data/hive.db
      - JWT_SECRET=${JWT_SECRET}
      - TRUST_PROXY=true # behind Nginx — enables real client IPs for rate limiting
      - ALLOW_SEED=${ALLOW_SEED:-false}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      # NOTE: ALLOW_HTTP is deliberately NOT set — cookies require HTTPS (Nginx provides it)
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/settings/public').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  nginx:
    image: nginx:alpine
    container_name: hive-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - hive

  certbot:
    image: certbot/certbot
    container_name: hive-certbot
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  hive-data:
  hive-uploads:
  certbot-certs:
  certbot-webroot:
